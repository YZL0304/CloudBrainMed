version: '3.8'

services:
  # 1. Nacos 注册中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: nacos
    restart: always
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8848/nacos" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app-network

  # 2. Sentinel 限流/熔断
  sentinel:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: sentinel
    restart: always
    ports:
      - "8858:8858"
    networks:
      - app-network

  # 3. 网关
  gateway-server:
    build:
      context: ../gateway-server
      dockerfile: Dockerfile
    container_name: gateway-server
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: ${NACOS_SERVER}
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - app-network

  # 4. admin-service
  admin-service:
    build:
      context: ../services/admin-service
      dockerfile: Dockerfile
    container_name: admin-service
    restart: always
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: ${NACOS_SERVER}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=public&sslmode=require
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - app-network

  # 5. ai-service
  ai-service:
    build:
      context: ../services/ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    restart: always
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: ${NACOS_SERVER}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=public&sslmode=require
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - app-network

  # 6. auth-service
  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: always
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: ${NACOS_SERVER}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=public&sslmode=require
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - app-network

  # 7. doctor-service
  doctor-service:
    build:
      context: ../services/doctor-service
      dockerfile: Dockerfile
    container_name: doctor-service
    restart: always
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: ${NACOS_SERVER}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=public&sslmode=require
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - app-network

  # 8. patient-service
  patient-service:
    build:
      context: ../services/patient-service
      dockerfile: Dockerfile
    container_name: patient-service
    restart: always
    ports:
      - "8085:8085"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: ${NACOS_SERVER}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=public&sslmode=require
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - app-network

  # 9. payment-service
  payment-service:
    build:
      context: ../services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: always
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: ${NACOS_SERVER}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=public&sslmode=require
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge